<svg xmlns="http://www.w3.org/2000/svg" width="1011" height="886" viewBox="0 0 1011 886" role="img" aria-labelledby="title desc">
  <title id="title">Bus Live Wialon dashboard screenshot</title>
  <desc id="desc">Preview of the bus route tracking dashboard with schedule cards, route status, language switcher and live map.</desc>
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#f4f7fb}.card{fill:#fff;filter:url(#shadow)}.muted{fill:#64748b;font:12px Arial}.text{fill:#0f172a;font:700 18px Arial}.title{fill:#fff;font:800 34px Arial}.white{fill:#fff}.smallwhite{fill:#dbeafe;font:12px Arial;letter-spacing:.12em}.bus{font:13px Arial;fill:#e5e7eb}.time{fill:#0f172a;font:800 16px Arial}.stop{fill:#f8fafc;stroke:#e5e7eb}.dot{fill:#e2e8f0}.mapgreen{fill:#a7d7a7}.mapblue{fill:#a8d6df}.road{stroke:#ef8a62;stroke-width:3;fill:none}.route{stroke:#3b82f6;stroke-width:2;stroke-dasharray:5 5;fill:none;opacity:.45}.pin{fill:#3b82f6}.buspin{fill:#0f766e;stroke:#fff;stroke-width:4}
    </style>
  </defs>
  <rect class="bg" width="1011" height="886"/>

  <rect x="42" y="12" width="945" height="122" rx="22" fill="url(#hero)"/>
  <text x="64" y="43" class="smallwhite">АВТОБУС ОНЛАЙН</text>
  <text x="64" y="82" class="title">Утренний маршрут</text>
  <text x="64" y="110" class="bus">33S8151(mekanizasyon/механизация)</text>
  <rect x="654" y="53" width="64" height="37" rx="19" fill="#ffffff22"/>
  <circle cx="672" cy="72" r="16" fill="#fff"/><text x="663" y="77" font-family="Arial" font-size="10" font-weight="700" fill="#0f766e">RU</text>
  <text x="694" y="76" font-family="Arial" font-size="10" font-weight="700" fill="#e5e7eb">TR</text>
  <rect x="727" y="53" width="238" height="40" rx="20" fill="#f8fafc"/>
  <text x="743" y="78" font-family="Arial" font-size="14" font-weight="800" fill="#172033">Маршрут сейчас не активен</text>

  <g filter="url(#shadow)">
    <rect x="42" y="149" width="306" height="76" rx="18" class="white"/>
    <rect x="361" y="149" width="306" height="76" rx="18" class="white"/>
    <rect x="681" y="149" width="306" height="76" rx="18" class="white"/>
  </g>
  <text x="60" y="176" class="muted">Текущая остановка</text><text x="60" y="204" class="text">Маршрут не активен</text>
  <text x="379" y="176" class="muted">Следующая остановка</text><text x="379" y="204" class="text">Маршрут не активен</text>
  <text x="699" y="176" class="muted">Прогноз прибытия</text><text x="699" y="204" class="text">—</text>

