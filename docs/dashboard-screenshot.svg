  <text x="60" y="274" class="text">Расписание</text><text x="362" y="272" class="muted">Утро</text>

  <g transform="translate(60 294)">
    <g><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:20</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Vadi Market</text><text x="109" y="39" class="muted">Vadi Market / Вади Маркет</text></g>
    <g transform="translate(0 62)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:22</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Carrefour market</text><text x="109" y="39" class="muted">Carrefour market</text></g>
    <g transform="translate(0 124)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:25</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Unlu Market</text><text x="109" y="39" class="muted">Ünlü market / Унлю Маркет</text></g>
    <g transform="translate(0 186)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:28</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Stadyum / Стадион</text><text x="109" y="39" class="muted">Stadyum / Стадион</text></g>
    <g transform="translate(0 248)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:29</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Kelebek</text><text x="109" y="39" class="muted">Kelebek mobilye / Келебек мебель</text></g>
    <g transform="translate(0 310)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:44</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Ekomini / Экомини</text><text x="109" y="39" class="muted">Ekomini / Экомини</text></g>
    <g transform="translate(0 372)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:46</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Ziraat Bankası / Банк Зираат</text><text x="109" y="39" class="muted">Ziraat bankası / Банк зираат</text></g>
    <g transform="translate(0 434)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">07:48</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">Botanic site</text><text x="109" y="39" class="muted">Botanic site</text></g>
    <g transform="translate(0 496)"><rect width="328" height="52" rx="12" class="stop"/><text x="12" y="32" class="time">08:30</text><circle cx="84" cy="26" r="12" class="dot"/><text x="80" y="30" font-size="13">○</text><text x="109" y="24" class="text" font-size="15">İNTENS / ИНТЕНС</text><text x="109" y="39" class="muted">İntens / Интенс</text></g>
  </g>

  <rect x="420" y="240" width="567" height="622" rx="20" class="card"/>
  <text x="438" y="274" class="text">Карта</text><text x="937" y="272" class="muted">0 км/ч</text>
  <clipPath id="mapclip"><rect x="438" y="294" width="531" height="416" rx="14"/></clipPath>
  <g clip-path="url(#mapclip)">
    <rect x="438" y="294" width="531" height="416" class="mapblue"/>
    <path d="M438 294 C540 300,595 330,655 305 C730 275,832 286,969 320 L969 294 Z" class="mapgreen"/>
    <path d="M438 520 C520 485,600 460,675 435 C760 404,870 380,969 385" class="road"/>
    <path d="M595 600 C660 530,725 460,817 405" class="route"/>
    <circle cx="585" cy="595" r="18" class="buspin"/><text x="573" y="601" font-size="19">🚌</text>
    <circle cx="783" cy="459" r="10" class="pin"/><circle cx="817" cy="405" r="10" class="pin"/>
    <rect x="448" y="304" width="24" height="48" fill="#fff" stroke="#d1d5db"/><text x="454" y="322" font-size="20" font-weight="700">+</text><line x1="448" y1="328" x2="472" y2="328" stroke="#d1d5db"/><text x="456" y="346" font-size="20">−</text>
    <text x="836" y="704" class="muted">Leaflet | © OpenStreetMap</text>
  </g>
</svg>
