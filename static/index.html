<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Servis Takibi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-main">
        <div id="eyebrow" class="eyebrow">Servis online</div>
        <h1 id="routeName">Güzergah</h1>
        <p id="busName">Yükleniyor...</p>
      </div>

      <div class="hero-actions">
        <div class="lang-switcher" aria-label="Language switcher">
          <button id="langRu" class="lang-btn" type="button" aria-label="Русский">🇷🇺</button>
          <button id="langTr" class="lang-btn active" type="button" aria-label="Türkçe">🇹🇷</button>
        </div>
        <div id="statusBadge" class="status-badge neutral">Yükleniyor</div>
      </div>
    </header>

    <section class="summary-grid">
      <div class="summary-card">
        <div id="currentStopLabel" class="label">Mevcut durak</div>
        <div id="currentStop" class="value">—</div>
      </div>

      <div class="summary-card">
        <div id="nextStopLabel" class="label">Sonraki durak</div>
        <div id="nextStop" class="value">—</div>
      </div>

      <div class="summary-card">
        <div id="etaLabel" class="label">Tahmini varış</div>
        <div id="etaText" class="value">—</div>
      </div>
    </section>

    <main class="content">
      <section class="panel schedule-panel">
        <div class="panel-title">
          <h2 id="scheduleTitle">Saatler</h2>
          <span id="routeDirection">Sabah</span>
        </div>

        <div id="schedule" class="timeline"></div>
      </section>

      <section class="panel map-panel">
        <div class="panel-title">
          <h2 id="mapTitle">Harita</h2>
          <span id="speedText">— km/sa</span>
        </div>

        <div id="map"></div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js?v=2"></script>
</body>
</html>
